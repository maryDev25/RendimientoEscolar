<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Escolar</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">

    <h1> Dashboard de Rendimiento Escolar</h1>

    <section class="resumen">
        <div class="card">Promedio<br><span id="promedio">0</span></div>
        <div class="card">Mejor<br><span id="mejor">-</span></div>
        <div class="card">Peor<br><span id="peor">-</span></div>
    </section>

    <section class="grafico">
        <h2>Rendimiento Académico</h2>
        <div id="barras" class="barras"></div>
    </section>

    <section class="lista">
        <h2>Lista de Alumnos</h2>
        <div id="listaAlumnos"></div>
    </section>

    <button onclick="imprimir()">Exportar PDF</button>

</div>

<script src="js/script.js"></script>
</body>
</html>
